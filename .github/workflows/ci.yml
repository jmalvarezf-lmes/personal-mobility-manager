name: CI

on:
  pull_request:
  workflow_call:

jobs:
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt && pip install -e .

      - name: Run ruff
        run: ruff check src/ tests/

      - name: Run mypy
        run: mypy src/

  test-backend:
    name: Test (backend)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DSN: postgresql://test:test@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt && pip install -e .

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ --cov=mobility_manager --cov-report=term-missing

  lint-frontend:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

  test-frontend:
    name: Test (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Create backend .env
        run: |
          echo "POSTGRES_DSN=postgresql://mobility:mobility@localhost:5432/mobility_manager" > .env
          echo "CORS_ORIGINS=http://localhost:5173" >> .env

      - name: Start backend services
        run: docker compose up -d postgres api

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: pnpm exec playwright test
