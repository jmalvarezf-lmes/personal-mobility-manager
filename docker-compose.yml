services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mobility_manager}
      POSTGRES_USER: ${POSTGRES_USER:-mobility}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mobility}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mobility} -d ${POSTGRES_DB:-mobility_manager}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OSM_TILE_URL: ${OSM_TILE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn mobility_manager.presentation.api.app:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
